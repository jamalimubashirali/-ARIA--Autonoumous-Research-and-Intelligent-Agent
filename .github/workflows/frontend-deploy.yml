name: Frontend Deployment

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "!.github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          if [ -z "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
             echo "::error::VERCEL_DEPLOY_HOOK_URL is not set"
             exit 1
          fi
          curl -X POST -f -s -S "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
